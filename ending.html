<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forever ❤️</title>

<link rel="stylesheet" href="css/style.css">

<style>

.ending-page{

min-height:100vh;

display:flex;
justify-content:center;
align-items:center;

text-align:center;

padding:40px;

}

.ending-card{

max-width:900px;

padding:60px;

background:rgba(255,255,255,.85);

backdrop-filter:blur(10px);

border-radius:30px;

box-shadow:
0 20px 50px rgba(0,0,0,.15);

}

.infinity{

font-size:120px;

color:#ff4f8b;

animation:pulse 2s infinite;

}

.names{

font-size:4rem;

font-family:'Dancing Script',cursive;

color:#ff4f8b;

margin:20px 0;

}

.date{

font-size:1.5rem;

font-weight:600;

margin:20px 0;

}

.message{

font-size:1.3rem;

line-height:2;

margin-top:30px;

}

.footer-love{

margin-top:50px;

font-size:2rem;

font-family:'Dancing Script',cursive;

color:#ff4f8b;

}

@keyframes pulse{

50%{
transform:scale(1.1);
}

}

.fade-in{

animation:fadeIn 3s;
}

@keyframes fadeIn{

from{
opacity:0;
}

to{
opacity:1;
}

}

</style>

</head>

<body>

<section class="ending-page">

<div class="ending-card fade-in">

<div class="infinity">
❤️
</div>

<div class="date">
01-07-2026
</div>

<p class="message">
Thank you for being my happiness, my comfort, and my favorite person. Life feels more beautiful, brighter, and meaningful with you in it. ❤️

Once again,

Happy Birthday, My Love ❤️

</p>

<div class="footer-love">

To Be Continued... ∞

<br><br>

Love,
Pinky ❤️

</div>

</div>

</section>

<script src="js/script.js"></script>

</body>

</html>
